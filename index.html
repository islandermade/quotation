<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>報價單｜島民制作視覺整合</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a1a;
    --ink-2: #555;
    --ink-3: #888;
    --line: #e0e0e0;
    --bg: #f5f4f0;
    --white: #ffffff;
    --accent: #1a1a1a;
    --radius: 8px;
    --font: 'Helvetica Neue', 'Arial', 'PingFang TC', 'Noto Sans TC', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .page-title {
    text-align: center;
    font-size: 13px;
    letter-spacing: .15em;
    color: var(--ink-3);
    margin-bottom: 1.5rem;
    text-transform: uppercase;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* ── 表單面板 ── */
  .form-panel {
    background: var(--white);
    border-radius: 12px;
    border: 1px solid var(--line);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-3);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 4px;
  }

  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--ink-3); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; }

  input, select, textarea {
    width: 100%;
    font-family: var(--font);
    font-size: 13px;
    color: var(--ink);
    background: #fafaf8;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 7px 10px;
    transition: border-color .15s;
    outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--ink); }
  input[readonly] { background: #f2f1ed; color: var(--ink-3); }
  textarea { resize: vertical; line-height: 1.5; }

  /* 項目表格 */
  .items-head {
    display: grid;
    grid-template-columns: 1fr 1fr 80px 80px 90px 28px;
    gap: 4px;
    padding: 4px 0;
    margin-bottom: 2px;
  }
  .items-head span {
    font-size: 10px;
    font-weight: 600;
    color: var(--ink-3);
    letter-spacing: .05em;
  }
  .items-head span:not(:first-child) { text-align: right; }

  .item-row {
    display: grid;
    grid-template-columns: 1fr 1fr 80px 80px 90px 28px;
    gap: 4px;
    margin-bottom: 4px;
    align-items: start;
  }
  .item-row input { text-align: left; }
  .item-row input.num { text-align: right; }
  .item-row textarea { font-size: 11px; min-height: 48px; }

  .del-btn {
    width: 28px; height: 32px;
    background: none;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--ink-3);
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .del-btn:hover { background: #ffeaea; border-color: #ffb3b3; color: #c00; }

  .add-btn {
    width: 100%; padding: 7px;
    font-size: 12px; font-family: var(--font);
    color: #3366cc;
    background: none;
    border: 1px dashed #99bbff;
    border-radius: var(--radius);
    cursor: pointer;
    margin-top: 2px;
    transition: background .15s;
  }
  .add-btn:hover { background: #eef3ff; }

  .form-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding-top: .75rem;
    border-top: 1px solid var(--line);
  }

  .btn {
    padding: 10px;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font);
    border-radius: var(--radius);
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    border: none;
  }
  .btn:active { transform: scale(.98); }
  .btn-primary { background: var(--ink); color: var(--white); }
  .btn-primary:hover { opacity: .85; }
  .btn-secondary { background: none; color: var(--ink); border: 1px solid var(--line); }
  .btn-secondary:hover { background: var(--bg); }

  /* ── 預覽面板 ── */
  .preview-panel {
    background: var(--bg);
    border-radius: 12px;
    padding: 1.25rem;
  }
  .preview-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 12px;
  }

  /* ── 報價單文件 ── */
  .quote-doc {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 2rem 1.75rem;
    font-size: 12px;
    line-height: 1.6;
  }

  .qd-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding-bottom: 1.25rem;
    margin-bottom: 1.25rem;
    border-bottom: 1.5px solid var(--ink);
  }
  .qd-co-name { font-size: 14px; font-weight: 700; letter-spacing: .05em; }
  .qd-co-en { font-size: 10px; color: var(--ink-3); margin-top: 2px; letter-spacing: .05em; }
  .qd-co-email { font-size: 10px; color: var(--ink-3); margin-top: 1px; }
  .qd-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: .2em;
    color: var(--ink);
    align-self: center;
  }

  .qd-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    margin-bottom: 1rem;
  }
  .qd-meta-block { padding: 5px 0; }
  .qd-meta-block:nth-child(odd) {
    border-right: 1px solid var(--line);
    padding-right: 12px;
  }
  .qd-meta-block:nth-child(even) { padding-left: 12px; }
  .qd-mk { font-size: 10px; color: var(--ink-3); }
  .qd-mv { font-size: 12px; font-weight: 600; margin-top: 1px; }

  .bank-info {
    background: #f7f6f2;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 10px;
    color: var(--ink-3);
    line-height: 1.8;
    margin-bottom: 1rem;
  }
  .bank-info strong { color: var(--ink); font-weight: 600; }

  .qd-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 1rem;
    font-size: 11px;
    table-layout: fixed;
  }
  .qd-table col.c-no   { width: 36px; }
  .qd-table col.c-name { width: 22%; }
  .qd-table col.c-desc { }
  .qd-table col.c-qty  { width: 40px; }
  .qd-table col.c-up   { width: 76px; }
  .qd-table col.c-amt  { width: 80px; }

  .qd-table th {
    padding: 6px 8px;
    background: #f2f1ed;
    font-weight: 600;
    text-align: left;
    border: 1px solid var(--line);
    font-size: 10px;
    letter-spacing: .04em;
  }
  .qd-table th.r, .qd-table td.r { text-align: right; }
  .qd-table th.c, .qd-table td.c { text-align: center; }
  .qd-table td {
    padding: 8px 8px;
    border: 1px solid var(--line);
    vertical-align: top;
    color: var(--ink);
  }
  .qd-table td .item-name { font-weight: 600; font-size: 11px; }
  .qd-table td .item-desc { font-size: 10px; color: var(--ink-2); margin-top: 3px; line-height: 1.5; white-space: pre-wrap; }

  .qd-note {
    font-size: 10px;
    color: var(--ink-3);
    line-height: 1.8;
    padding: 8px 0;
    border-top: 1px solid var(--line);
    margin-bottom: .75rem;
  }

  .qd-totals { display: flex; justify-content: flex-end; margin-bottom: 1.25rem; }
  .qd-total-box { min-width: 200px; }
  .qd-tr {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--ink-3);
    padding: 3px 0;
    border-bottom: 1px solid var(--line);
  }
  .qd-tr.grand {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    padding: 6px 0;
    border-bottom: none;
  }

  .qd-sig {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--line);
  }
  .qd-sig-box { text-align: center; }
  .qd-sig-label { font-size: 10px; color: var(--ink-3); }
  .qd-sig-line { border-bottom: 1px solid #bbb; margin: 24px 0 4px; }

  /* ── 列印樣式 ── */
  @media print {
    body { background: white; padding: 0; }
    .page-title, .form-panel, .preview-label { display: none !important; }
    .layout { display: block; max-width: 100%; }
    .preview-panel { background: white; padding: 0; border-radius: 0; }
    .quote-doc { border: none; border-radius: 0; padding: 1.5cm 2cm; font-size: 11pt; }
    .qd-top { border-bottom: 2px solid #000; }
    .qd-table { font-size: 10pt; }
    .qd-table th { background: #eee !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .bank-info { background: #f5f5f3 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<p class="page-title">Islander Made 島民制作視覺整合｜報價單產生器</p>

<div class="layout">

  <!-- ══ 左側：表單 ══ -->
  <div class="form-panel">

    <div>
      <div class="section-label">客戶資訊</div>
      <div class="grid-2" style="margin-top:8px">
        <div class="field">
          <label>公司名稱</label>
          <input id="clientCo" placeholder="客戶公司名稱" oninput="render()">
        </div>
        <div class="field">
          <label>統一編號</label>
          <input id="clientTax" placeholder="統一編號" oninput="render()">
        </div>
        <div class="field">
          <label>聯絡人</label>
          <input id="clientContact" placeholder="聯絡人姓名" oninput="render()">
        </div>
        <div class="field">
          <label>聯絡方式</label>
          <input id="clientPhone" placeholder="電話或信箱" oninput="render()">
        </div>
      </div>
    </div>

    <div>
      <div class="section-label">報價資訊</div>
      <div style="margin-top:8px; display:flex; flex-direction:column; gap:8px">
        <div class="field">
          <label>專案名稱</label>
          <input id="projName" placeholder="例：南迴藝術季品牌視覺設計" oninput="render()">
        </div>
        <div class="grid-3">
          <div class="field">
            <label>報價日期</label>
            <input type="date" id="qDate" oninput="render()">
          </div>
          <div class="field">
            <label>有效日期</label>
            <input type="date" id="vDate" oninput="render()">
          </div>
          <div class="field">
            <label>營業稅</label>
            <select id="taxRate" onchange="render()">
              <option value="0">不含稅</option>
              <option value="0.05" selected>含稅 5%</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-label">服務項目</div>
      <div class="items-head" style="margin-top:8px">
        <span>專案名稱</span>
        <span style="text-align:left">內容說明</span>
        <span style="text-align:right">數量</span>
        <span style="text-align:right">單價</span>
        <span style="text-align:right">金額</span>
        <span></span>
      </div>
      <div id="itemsBody"></div>
      <button class="add-btn" onclick="addItem()">＋ 新增項目</button>
    </div>

    <div>
      <div class="section-label">備註與條款</div>
      <div class="field" style="margin-top:8px">
        <label>備註（顯示於報價單底部）</label>
        <textarea id="notes" rows="5" oninput="render()"></textarea>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn btn-secondary" onclick="clearForm()">清除重填</button>
      <button class="btn btn-primary" onclick="window.print()">列印 / 輸出 PDF</button>
    </div>

  </div>

  <!-- ══ 右側：預覽 ══ -->
  <div class="preview-panel">
    <div class="preview-label">即時預覽</div>
    <div class="quote-doc" id="quoteDoc"></div>
  </div>

</div>

<script>
  /* ── 初始資料 ── */
  let items = [
    { name: '主視覺設計', desc: '① 主視覺概念釋義\n② 主視覺直式海報（印刷用 A1 尺寸：297mm×420mm）', qty: 1, price: 0 },
    { name: '品牌延伸物', desc: '品牌 logo 完稿後，提供延伸物如名片設計等，每項目提供 1–2 款供挑選。', qty: 1, price: 35000 },
    { name: '品牌行銷企劃（一季）', desc: '① 品牌定位（品牌故事定位、使用者流程）\n② 商品行銷企劃（行銷策略）\n③ 行銷推廣：3篇圖文＋3支形象短影片＋1支品牌形象影片', qty: 1, price: 0 },
  ];

  const DEFAULT_NOTES =
    '確認報價後，將先收取總金額 50% 作為頭款，於所有設計結案後收取尾款。\n' +
    '本報價單不包含印刷執行，若需協助，將酌收總價之 10% 作為服務費。\n' +
    '經雙方共同協議簽名及簽回後，此報價合約內容即生效。\n' +
    '付清款項後，該作品著作使用權專屬授權提供，除作品展覽、其他教學、公益活動展示等情形以外。';

  /* ── 工具函式 ── */
  function fmt(n) { return Math.round(n).toLocaleString('zh-TW'); }
  function today() { return new Date().toISOString().slice(0, 10); }
  function addDays(d, n) {
    const dt = new Date(d); dt.setDate(dt.getDate() + n);
    return dt.toISOString().slice(0, 10);
  }
  function fmtDate(d) { return d ? d.replace(/-/g, '/') : '—'; }
  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function nl2br(s) { return (s || '').replace(/\n/g,'<br>'); }

  /* ── 項目列表渲染 ── */
  function renderItems() {
    document.getElementById('itemsBody').innerHTML = items.map((it, i) => `
      <div class="item-row">
        <input value="${esc(it.name)}" placeholder="專案名稱"
          oninput="items[${i}].name=this.value;render()">
        <textarea rows="3" placeholder="內容說明"
          oninput="items[${i}].desc=this.value;render()">${esc(it.desc)}</textarea>
        <input class="num" type="number" value="${it.qty}" min="1"
          oninput="items[${i}].qty=+this.value||1;render()">
        <input class="num" type="number" value="${it.price}" min="0"
          oninput="items[${i}].price=+this.value||0;render()">
        <input class="num" readonly value="NT$ ${fmt(it.qty * it.price)}">
        <button class="del-btn" title="刪除" onclick="removeItem(${i})">×</button>
      </div>
    `).join('');
  }

  function addItem() {
    items.push({ name: '', desc: '', qty: 1, price: 0 });
    renderItems(); render();
  }
  function removeItem(i) {
    if (items.length === 1) return;
    items.splice(i, 1);
    renderItems(); render();
  }

  /* ── 報價單預覽渲染 ── */
  function render() {
    const co      = document.getElementById('clientCo').value || '（公司名稱）';
    const tax     = document.getElementById('clientTax').value || '—';
    const contact = document.getElementById('clientContact').value;
    const phone   = document.getElementById('clientPhone').value;
    const proj    = document.getElementById('projName').value || '（請填入專案名稱）';
    const qd      = document.getElementById('qDate').value || today();
    const vd      = document.getElementById('vDate').value;
    const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
    const notes   = document.getElementById('notes').value || DEFAULT_NOTES;

    const sub     = items.reduce((s, it) => s + it.qty * it.price, 0);
    const taxAmt  = Math.round(sub * taxRate);
    const total   = sub + taxAmt;

    const rows = items.map((it, i) => `
      <tr>
        <td class="c">${i + 1}</td>
        <td>
          <div class="item-name">${esc(it.name) || '—'}</div>
        </td>
        <td>
          <div class="item-desc">${nl2br(esc(it.desc))}</div>
        </td>
        <td class="r">${it.qty}</td>
        <td class="r">${it.price ? 'NT$ ' + fmt(it.price) : '—'}</td>
        <td class="r">${it.price ? 'NT$ ' + fmt(it.qty * it.price) : '—'}</td>
      </tr>
    `).join('');

    const taxRow = taxRate > 0
      ? `<div class="qd-tr"><span>營業稅（${(taxRate * 100).toFixed(0)}%）</span><span>NT$ ${fmt(taxAmt)}</span></div>`
      : '';

    const noteLines = notes.split('\n').filter(l => l.trim())
      .map(l => `• ${esc(l)}`).join('<br>');

    document.getElementById('quoteDoc').innerHTML = `
      <div class="qd-top">
        <div>
          <div class="qd-co-name">島民制作視覺整合</div>
          <div class="qd-co-en">Islander Made Visual Integration</div>
          <div class="qd-co-email">islander1011@islandermade.info</div>
        </div>
        <div class="qd-title">QUOTATION</div>
      </div>

      <div class="qd-meta">
        <div class="qd-meta-block">
          <div class="qd-mk">專案名稱</div>
          <div class="qd-mv">${esc(proj)}</div>
        </div>
        <div class="qd-meta-block">
          <div class="qd-mk">公司名稱</div>
          <div class="qd-mv">${esc(co)}</div>
        </div>
        <div class="qd-meta-block">
          <div class="qd-mk">報價日期</div>
          <div class="qd-mv">${fmtDate(qd)}</div>
        </div>
        <div class="qd-meta-block">
          <div class="qd-mk">統一編號</div>
          <div class="qd-mv">${esc(tax)}</div>
        </div>
        <div class="qd-meta-block">
          <div class="qd-mk">有效日期</div>
          <div class="qd-mv">${vd ? fmtDate(vd) : '—'}</div>
        </div>
        <div class="qd-meta-block">
          ${contact ? `<div class="qd-mk">聯絡人</div><div class="qd-mv">${esc(contact)}${phone ? '　' + esc(phone) : ''}</div>` : ''}
        </div>
      </div>

      <div class="bank-info">
        匯款資訊｜匯款手續費請自行負擔<br>
        銀行代號｜<strong>006 合作金庫商業銀行 枋寮分行</strong><br>
        戶名｜<strong>島民設計</strong>　帳號｜<strong>5838717131420</strong>
      </div>

      <table class="qd-table">
        <colgroup>
          <col class="c-no"><col class="c-name"><col class="c-desc">
          <col class="c-qty"><col class="c-up"><col class="c-amt">
        </colgroup>
        <thead>
          <tr>
            <th class="c">項次</th>
            <th>專案名稱</th>
            <th>內容說明</th>
            <th class="r">數量</th>
            <th class="r">單價</th>
            <th class="r">金額</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>

      <div class="qd-note">${noteLines}</div>

      <div class="qd-totals">
        <div class="qd-total-box">
          <div class="qd-tr"><span>小計</span><span>NT$ ${fmt(sub)}</span></div>
          ${taxRow}
          <div class="qd-tr grand"><span>總金額</span><span>NT$ ${fmt(total)}</span></div>
        </div>
      </div>

      <div class="qd-sig">
        <div class="qd-sig-box">
          <div class="qd-sig-label">客戶簽名：</div>
          <div class="qd-sig-line"></div>
        </div>
        <div class="qd-sig-box">
          <div class="qd-sig-label">設計師簽章：</div>
          <div class="qd-sig-line"></div>
        </div>
      </div>
    `;
  }

  /* ── 清除表單 ── */
  function clearForm() {
    if (!confirm('確定要清除所有資料重新填寫嗎？')) return;
    ['clientCo','clientTax','clientContact','clientPhone','projName'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('taxRate').value = '0.05';
    document.getElementById('notes').value = '';
    items = [{ name: '', desc: '', qty: 1, price: 0 }];
    init(); renderItems(); render();
  }

  /* ── 初始化 ── */
  function init() {
    const t = today();
    document.getElementById('qDate').value = t;
    document.getElementById('vDate').value = addDays(t, 7);
    document.getElementById('notes').value = DEFAULT_NOTES;
  }

  init();
  renderItems();
  render();
</script>
</body>
</html>
